services:
  app:
    image: ghcr.io/ainxtgendev/stecher-tennis-app:latest
    networks:
      - tennis_net
    volumes:
      - tennis_data:/app/data
    env_file: .env
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # No ports: block — port 5000 only reachable inside Docker network (COMP-02)

  caddy:
    image: ghcr.io/ainxtgendev/stecher-tennis-caddy:latest
    networks:
      - tennis_net
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy

networks:
  tennis_net:
    driver: bridge

volumes:
  tennis_data:   # SQLite persistence — survives compose down (COMP-03)
  caddy_data:    # Caddy state — needed for Phase 3 TLS certs
