services:
  app:
    image: ghcr.io/ainxtgendev/stecher-tennis-app:latest
    networks:
      - tennis_net
    volumes:
      - tennis_data:/app/data
    env_file: .env
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # No ports: block — port 5000 only reachable inside Docker network (COMP-02)

  backup:
    image: ghcr.io/ainxtgendev/stecher-tennis-app:latest
    entrypoint: ["python", "/app/backup_db.py", "--loop"]
    networks:
      - tennis_net
    volumes:
      - tennis_data:/app/data          # RW: WAL needs the -shm; backup only reads
      - ./backups:/backups             # host dir, OUTSIDE the live volume (DR isolation)
      - ./backup_db.py:/app/backup_db.py:ro
    env_file: .env
    environment:
      DB_PATH: /app/data/tennis.db
      BACKUP_DIR: /backups
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "/app/backup_db.py", "--healthcheck"]
      interval: 5m
      timeout: 20s
      retries: 2
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: ghcr.io/ainxtgendev/stecher-tennis-caddy:latest
    networks:
      - tennis_net
    ports:
      - "${HTTPS_PORT:-443}:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    env_file: .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      app:
        condition: service_healthy

networks:
  tennis_net:
    driver: bridge

volumes:
  tennis_data:   # SQLite persistence — survives compose down (COMP-03)
  caddy_data:    # Caddy state — needed for Phase 3 TLS certs
