<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Admin Panel</title>
  <style>
    /* Global Styles using lemon yellow/grey theme */
    body {
      background-color: #f2f2f2; /* light grey background */
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    header {
      text-align: center;
      margin-bottom: 30px;
      background-color: #f8e473; /* warm lemon yellow */
      padding: 20px;
      border-bottom: 3px solid #ccc;
    }
    header h1 {
      font-size: 3rem;
      margin: 0;
      color: #000; /* black for strong contrast */
      text-shadow: 1px 1px 2px #aaa;
    }
    main {
      max-width: 1200px;
      margin: 0 auto;
    }
    .challenge-container {
      background-color: #fff; /* white background for content */
      border: 1px solid #ccc; /* grey border */
      border-radius: 5px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }
    .challenge-container:hover {
      transform: translateY(-5px);
    }
    .challenge-container p {
      margin: 0 0 10px;
      font-size: 1.5rem;
      color: #333;
    }
    .challenge-container form {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
    }
    .challenge-container form label {
      font-size: 1.5rem;
      margin-right: 10px;
      color: #000;
    }
    .challenge-container form select {
      font-size: 1.5rem;
      padding: 10px;
      margin-right: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background-color: #f7f7f7; /* light grey */
      color: #333;
      outline: none;
      appearance: none;
    }
    .challenge-container form button {
      font-size: 1.5rem;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      background-color: #f8e473; /* lemon yellow */
      color: #000;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .challenge-container form button:hover {
      background-color: #e6d661; /* slightly darker lemon yellow */
    }
    /* Custom scrollbar for modern touch */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: #f2f2f2;
    }
    ::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #f8e473;
    }
  </style>
  <!-- Load jQuery (for DOM manipulation and AJAX) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Load Socket.IO client from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/3.1.3/socket.io.min.js"></script>
</head>
<body>
  <header>
    <h1>Pending Challenges</h1>
  </header>
  <main>
    <!-- Wrap challenges in a container to allow dynamic updating -->
    <div id="challenges-container">
      {% for challenge in challenges %}
        <div class="challenge-container">
          <p>
            {{ challenge.challenger_name }} vs {{ challenge.opponent_name }} 
            (Deadline: {{ challenge.deadline }})
          </p>
          <form method="POST" action="/submit_result">
            <input type="hidden" name="challenge_id" value="{{ challenge.id }}">
            <label for="result-{{ challenge.id }}">Result:</label>
            <select id="result-{{ challenge.id }}" name="result">
              <option value="challenger_wins">{{ challenge.challenger_name }} Wins</option>
              <option value="opponent_wins">{{ challenge.opponent_name }} Wins</option>
              <option value="not_happened">Not Happened</option>
            </select>
            <button type="submit">Submit Result</button>
          </form>
        </div>
      {% endfor %}
    </div>
  </main>

  <script>
    $(document).ready(function(){
      // Initialize Socket.IO client
      var socket = io();

      // When an update event is received, refresh the challenges container.
      socket.on("update", function(data) {
        console.log("Received update event", data);
        updateChallenges();
      });

      // Function to update the challenge list from the /admin route.
      function updateChallenges() {
        $.get("/admin", function(data){
          // Use DOMParser to extract the new challenges container.
          var parser = new DOMParser();
          var doc = parser.parseFromString(data, "text/html");
          var newContent = doc.querySelector("#challenges-container").innerHTML;
          $("#challenges-container").html(newContent);
        });
      }
    });
  </script>
</body>
</html>
