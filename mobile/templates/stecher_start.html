<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sophisticated Tennis Ball Animation with Y-Axis Racket Rotation</title>
  <style>
    /* Modern full-screen gradient background and reset */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      /* Modern dark gradient background */
      background: linear-gradient(135deg, #1e1e1e, #3c3c3c);
      font-family: Arial, sans-serif;
    }
    /* Fullscreen canvas for tennis ball animation */
    #tennisCanvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    /* 3D Tennis Ball Button with the label "Matthias" */
    #joinButton {
      position: absolute;
      top: 300px;
      left: 50%;
      /* Using translate to center and applying a perspective/rotation for 3D effect */
      transform: translate(-50%, 0) perspective(600px) rotateX(10deg);
      width: 150px;
      height: 150px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      z-index: 2;
      /* Create a tennis ball look using radial gradients */
      background: radial-gradient(circle at 30% 30%, #fff, #ffde00 40%, #c4d600 70%);
      /* Inset and outer shadows create a 3D “popped” effect */
      box-shadow: 
        inset -4px -4px 10px rgba(0, 0, 0, 0.3),
        4px 4px 10px rgba(0, 0, 0, 0.5);
      outline: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(255, 255, 255, 0.8);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      transform-style: preserve-3d;
    }
    /* On hover, the button “flattens” a bit and enlarges */
    #joinButton:hover {
      transform: translate(-50%, 0) perspective(600px) rotateX(0deg) scale(1.05);
      box-shadow: 
        inset -2px -2px 8px rgba(0, 0, 0, 0.3),
        6px 6px 12px rgba(0, 0, 0, 0.6);
    }
    /* Use pseudo-elements to simulate the tennis ball seam */
    #joinButton::before,
    #joinButton::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50%;
    }
    /* Diagonal seam line at 45° */
    #joinButton::before {
      width: 80%;
      height: 8px;
      top: 46%;
      left: 10%;
      transform: rotate(45deg);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }
    /* Opposite diagonal seam line */
    #joinButton::after {
      width: 80%;
      height: 8px;
      top: 46%;
      left: 10%;
      transform: rotate(-45deg);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <canvas id="tennisCanvas"></canvas>
  <!-- The button now appears as a 3D tennis ball with the label "Matthis" -->
  <button id="joinButton">Matthias</button>

  <script>
    // Setup full-screen canvas using window dimensions
    const canvas = document.getElementById("tennisCanvas");
    const ctx = canvas.getContext("2d");
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      console.log("Canvas size:", canvas.width, canvas.height);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // Utility: random number between min and max
    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    // Utility: generate a random yellow color (for variety in the animation)
    function randomYellow() {
      const hue = randomBetween(50, 60);
      const saturation = randomBetween(70, 100);
      const lightness = randomBetween(50, 70);
      return `hsl(${hue.toFixed(0)}, ${saturation.toFixed(0)}%, ${lightness.toFixed(0)}%)`;
    }

    // Define a tennis ball animation element with rotation and squash/stretch
    class Ball {
      constructor() {
        this.radius = randomBetween(15, 25);
        this.x = randomBetween(this.radius, canvas.width - this.radius);
        this.y = randomBetween(this.radius, canvas.height - this.radius);
        this.vx = randomBetween(-4, 4);
        this.vy = randomBetween(-4, 4);
        this.angle = randomBetween(0, Math.PI * 2);
        this.angularVelocity = randomBetween(-0.05, 0.05);
        this.scaleX = 1;
        this.scaleY = 1;
        this.color = randomYellow();
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.angularVelocity;

        // Horizontal collision
        if (this.x + this.radius > canvas.width) {
          this.x = canvas.width - this.radius;
          this.vx = -this.vx;
          this.scaleX = 0.8;
          this.scaleY = 1.2;
        } else if (this.x - this.radius < 0) {
          this.x = this.radius;
          this.vx = -this.vx;
          this.scaleX = 0.8;
          this.scaleY = 1.2;
        }
        // Vertical collision
        if (this.y + this.radius > canvas.height) {
          this.y = canvas.height - this.radius;
          this.vy = -this.vy;
          this.scaleY = 0.8;
          this.scaleX = 1.2;
        } else if (this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy = -this.vy;
          this.scaleY = 0.8;
          this.scaleX = 1.2;
        }

        // Ease squash/stretch back to normal
        this.scaleX += (1 - this.scaleX) * 0.1;
        this.scaleY += (1 - this.scaleY) * 0.1;
      }

      draw(ctx) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.scale(this.scaleX, this.scaleY);
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 10;
        const grad = ctx.createRadialGradient(
          -this.radius / 3, -this.radius / 3, this.radius / 2,
          0, 0, this.radius
        );
        grad.addColorStop(0, "#FFF176");
        grad.addColorStop(1, this.color);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Create and animate multiple balls
    const numBalls = 100;
    const balls = [];
    for (let i = 0; i < numBalls; i++) {
      balls.push(new Ball());
    }

    // Tennis racket image with Y-axis rotation effect
    const racketImg = new Image();
    racketImg.src = "/static/01_tennis_racket.png";
    let racketYAngle = 0;

    function animate() {
      // Draw a semi-transparent overlay for a trailing effect
      ctx.fillStyle = "rgba(30, 30, 30, 0.3)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let ball of balls) {
        ball.update();
        ball.draw(ctx);
      }

      if (racketImg.complete && racketImg.naturalWidth !== 0) {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        ctx.save();
        ctx.translate(centerX, centerY);
        const scaleX = Math.cos(racketYAngle);
        ctx.scale(scaleX, 1);
        ctx.drawImage(racketImg, -racketImg.width / 2, -racketImg.height / 2);
        ctx.restore();
        racketYAngle += 0.005;
      }
      requestAnimationFrame(animate);
    }
    animate();

    // Button click: navigate to "index.html"
    const joinButton = document.getElementById("joinButton");
    if (joinButton) {
      joinButton.addEventListener("click", function() {
        window.location.href = "/index";
      });
    } else {
      console.error("joinButton not found!");
    }
  </script>
</body>
</html>
