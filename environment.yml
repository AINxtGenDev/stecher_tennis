name: stecher_tennis
channels:
  - conda-forge
  - defaults
dependencies:
  # Core dependencies
  - python=3.12
  - flask
  - flask-cors     # Useful for API development
  - python-dotenv  # For environment variable management
  - werkzeug       # WSGI web application library
  - click          # Command line interface creation kit
  - itsdangerous   # Security signing
  - jinja2         # Template engine
  - flask-socketio # For real-time communication with Socket.IO
  - pip            # For any packages not available in conda
  # Optional: Recommended for better performance with Flask-SocketIO (async mode)
  - eventlet
  # Development and testing tools
  - pytest         # For testing your application
  - black          # For code formatting
  - flake8         # For code linting
  - flask-testing  # For Flask-specific testing utilities
  - coverage       # For code coverage reporting
  # Debug tools
  - flask-debugtoolbar  # For debugging Flask applications  
  # Optional but recommended
  # - gunicorn       # For production deployment
  - watchdog       # For auto-reloading during development

